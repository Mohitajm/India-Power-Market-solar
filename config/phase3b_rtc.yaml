# config/phase3b_rtc.yaml — Architecture v10 RTC FINAL (Reverse DC System)

n_scenarios: 100
lambda_risk: 0.0
risk_alpha: 0.10
reschedule_blocks: [34, 42, 50, 58]

paths:
  # Price scenarios (from ML pipeline)
  scenarios_dam:   Data/Predictions/joint_dam_scenarios_backtest_recalibrated.parquet
  scenarios_rtm:   Data/Predictions/joint_rtm_scenarios_backtest_recalibrated.parquet

  # Price actuals
  actuals_dam:     Data/Predictions/dam_quantiles_backtest.csv
  actuals_rtm:     Data/Predictions/rtm_quantiles_backtest.csv

  # True 15-min IEX prices (used for actual settlement)
  price_parquet:   Data/Cleaned/price/iex_prices_combined_filled.parquet

  # Solar profiles — RTC parquets (scale=1.0, dc_con=16.4 MW)
  # Run build_solar_profiles_rtc.py first if these don't exist
  solar_da_path:   Data/Solar/rtc/solar_da_rtc.parquet
  solar_nc_path:   Data/Solar/rtc/solar_nc_rtc.parquet
  solar_at_path:   Data/Solar/rtc/solar_actuals_rtc.parquet

  # Results output directory
  results_dir:     results/phase3b_rtc
